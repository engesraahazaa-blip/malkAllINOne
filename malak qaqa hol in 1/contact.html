<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contact</title>
    <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
    }
    body::before {
      content: "";
      background-image: url('contakt.png'); /* تحديد رابط الصورة */
      background-size: cover; /* ضبط حجم الصورة لتغطي الخلفية */
      background-repeat: no-repeat; /* عدم تكرار الصورة */
      background-attachment: fixed; /* تثبيت الخلفية */
      position: fixed; /* تثبيت الصورة لتغطي الخلفية بالكامل */
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1; /* خلف جميع العناصر الأخرى */
    }
    .navbar {
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      background-color: #15411296; 
      padding: 10px 10px; 
      position: fixed; 
      top: 0; /* ضبط الشريط في أعلى الصفحة */
      width: 100%;  /* ضبط عرض الشريط ليتناسب مع عرض الصفحة */
      box-shadow: 0 2px 4px rgba(204, 200, 200, 0.1); /* إضافة ظل للشريط */
      z-index: 1000; /* تحديد ترتيب الز-index لضمان بقاء الشريط فوق جميع العناصر الأخرى */
    }
    .logo {
      width: 70px; /* عرض الشعار */
      height: 70px; /* ارتفاع الشعار */
      border-radius: 50%; /* جعل الشعار دائري الشكل */
    }
    .nav-links a {
      color: rgb(255, 255, 255); /* ضبط لون الروابط */
      text-decoration: none; /* إزالة التزيين عن النص */
      padding: 0 15px; /* إضافة حشوات للروابط */
      transition: color 0.3s; /* ضبط تأثير الانتقال على اللون */
      text-align: rtl;
    }
    .content {
      display: flex;
      justify-content: center;
      align-items: center;
      height: calc(100vh - 100px); /* تعديل ارتفاع المحتوى بناءً على شريط التنقل */
      margin-top: 70px; /* إضافة مسافة أعلى المحتوى لتجنب التداخل مع شريط التنقل */
      background-color: transparent; /* إزالة اللون الشفاف */
    }
    .form-box {
      width: 320px;
      padding: 20px;
      background: linear-gradient(135deg, #f8f9fa, #e9ecef);
      border: 1px solid #ced4da;
      border-radius: 15px;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
      text-align: center;
    }
    .form-box h3 {
      margin: 0 0 20px;
      color: #495057;
      font-size: 24px;
    }
    .form-box input[type="text"],
    .form-box input[type="tel"],
    .form-box input[type="email"] {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ced4da;
      border-radius: 5px;
      box-sizing: border-box;
      font-size: 16px;
    }
    .form-box button {
      width: 100%;
      padding: 10px;
      background-color: #276e15;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 18px;
      cursor: pointer;
    }
    .form-box button:hover {
      background-color: #4b9438;
    }
    </style>
</head>
<body>
    <div class="navbar">
        <img src="الشعار.png" alt="شعار الشركة" class="logo">
        <div class="nav-links">
            <a href="hom .html">Home</a> <!-- رابط الصفحة الرئيسية -->
            <a href="activities.html">Activities</a> 
            <a href="utilities.html">Utilities</a> 
            <a href="five rounds.html">Five rounds</a>
            <a href="contact.html">Contact</a>
        </div>
    </div>
    <div class="content">
        <div class="form-box">
            <h3>تواصل معنا</h3>
            <form>
                <input type="text" name="name" placeholder="الاسم" required>
                <input type="tel" name="phone" placeholder="رقم الهاتف" required>
                <input type="email" name="email" placeholder="البريد الإلكتروني" required>
                <button type="submit">إرسال</button>
            </form>
        </div>
    </div>
</body>
</html>
